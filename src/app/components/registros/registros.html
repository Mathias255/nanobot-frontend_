<div class="card-modulo p-4">
  <div class="registro-header mb-4 text-center">
    <h2 class="section-title text-white">👤 Registro de Nuevos Clientes</h2>
    <p class="section-subtitle text-muted">Únete a la red de Nanobot Systems y accede a preventas de hardware exclusivas.</p>
  </div>

  <form class="registro-form" (submit)="$event.preventDefault(); enviarRegistro()">
    
    <div class="form-group-custom">
      <label for="reg-nombre">Nombre Completo</label>
      <input type="text" id="reg-nombre" name="nombre" placeholder="Ej. Mathias Silva" required class="input-cyber">
    </div>

    <div class="form-group-custom">
      <label for="reg-email">Correo Electrónico</label>
      <input type="email" id="reg-email" name="email" placeholder="nombre@ejemplo.com" required class="input-cyber">
    </div>

    <div class="form-group-custom">
      <label for="reg-password">Contraseña de Seguridad</label>
      <input type="password" id="reg-password" name="password" placeholder="••••••••" required class="input-cyber">
    </div>

    <div class="form-group-custom">
      <label for="reg-telefono">Teléfono de Contacto</label>
      <input type="tel" id="reg-telefono" name="telefono" placeholder="Ej. 0999999999" class="input-cyber">
    </div>

    <div class="form-check-custom">
      <input type="checkbox" id="reg-terminos" required>
      <label for="reg-terminos">Acepto los términos de garantía robótica y protección de datos.</label>
    </div>

    <button type="submit" class="btn-enviar-registro">
      Crear Cuenta Nanobot 🚀
    </button>

  </form>
</div>
