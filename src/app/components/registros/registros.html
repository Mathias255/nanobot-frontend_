<div style="max-width: 500px; margin: 0 auto; padding: 20px; font-family: sans-serif;">
  <div style="background-color: #0d1224; border: 1px solid #1e293b; border-radius: 12px; padding: 35px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); color: #ffffff; text-align: left;">
    
    <div style="text-align: center; margin-bottom: 25px;">
      <span style="font-size: 2.5rem;">👤</span>
      <h3 style="color: #ffffff; margin-top: 10px; font-weight: 700;">Registro de Cliente</h3>
      <p style="color: #64748b; font-size: 0.9rem; margin: 0;">
        Ingresa tus datos de usuario correspondientes a tu cuenta de Nanobot.
      </p>
    </div>

    <div style="margin-bottom: 20px;">
      <label style="display: block; color: #94a3b8; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.5px;">
        Nombre Completo:
      </label>
      <input type="text" [(ngModel)]="nombreCliente" placeholder="Ej. Mathias Alejandro" 
             style="width: 100%; background-color: #060913; border: 1px solid #1e293b; border-radius: 8px; padding: 12px; color: #ffffff; font-size: 0.95rem; outline: none; box-sizing: border-box;">
    </div>

    <div style="margin-bottom: 25px;">
      <label style="display: block; color: #94a3b8; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.5px;">
        Correo Electrónico:
      </label>
      <input type="email" [(ngModel)]="emailCliente" placeholder="ejemplo@nanobot.com" 
             style="width: 100%; background-color: #060913; border: 1px solid #1e293b; border-radius: 8px; padding: 12px; color: #ffffff; font-size: 0.95rem; outline: none; box-sizing: border-box;">
    </div>

    <button (click)="registrar()"
            style="width: 100%; background-color: #0dcaf0; color: #060913; border: none; padding: 14px; border-radius: 8px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: transform 0.2s; box-shadow: 0 4px 10px rgba(13, 202, 240, 0.2);">
      Guardar Datos de Usuario →
    </button>

  </div>
</div>
