<div>
  <h3 class="catalogo-titulo">📦 Catálogo General</h3>
  
  <div class="grid-productos">
    
    <div *ngFor="let p of productos" class="producto-card d-flex flex-column justify-content-between">
      <div>
        <h4 class="producto-nombre">{{ p.nombre }}</h4>
        <p class="producto-desc">{{ p.descripcion || 'Sin descripción' }}</p>
      </div>
      
      <div class="d-flex justify-content-between align-items-center mt-3">
        <span class="producto-precio">${{ p.precio }}</span>
        <button class="btn btn-sm btn-outline-info text-dark font-weight-bold" (click)="agregarAlCarrito(p)">
          ＋ Agregar
        </button>
      </div>
    </div>

  </div>

  <div *ngIf="productos.length === 0" class="sin-productos">
    No se encontraron productos en el catálogo o Flask está apagado.
  </div>
</div>
